<!DOCTYPE html>
<html class="scroll-smooth dark" lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Login - CleanStream Portal</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;600;700;800&amp;family=JetBrains+Mono:wght@700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
          darkMode: "class",
          theme: {
            extend: {
              "colors": {
                      "on-primary-fixed-variant": "#bfdbfe",
                      "on-error-container": "#ffb4ab",
                      "on-secondary": "#111827",
                      "on-tertiary-fixed-variant": "#e2e8f0",
                      "inverse-surface": "#f3f4f6",
                      "error-container": "#93000a",
                      "error": "#ffb4ab",
                      "on-primary": "#111827",
                      "on-error": "#690005",
                      "on-tertiary-fixed": "#e2e8f0",
                      "secondary-container": "#065f46",
                      "surface-container": "#1f2937",
                      "primary-fixed": "#1e3a8a",
                      "on-surface-variant": "#9ca3af",
                      "on-tertiary": "#111827",
                      "fresh-mint": "#064e3b",
                      "surface-container-highest": "#374151",
                      "secondary-fixed": "#059669",
                      "tertiary-container": "#334155",
                      "surface-tint": "#60a5fa",
                      "tertiary-fixed": "#475569",
                      "secondary-fixed-dim": "#10b981",
                      "on-primary-container": "#dbeafe",
                      "background": "#030712",
                      "slate-gray": "#9ca3af",
                      "on-background": "#f9fafb",
                      "surface-dim": "#111827",
                      "on-secondary-container": "#d1fae5",
                      "surface-container-lowest": "#030712",
                      "inverse-on-surface": "#111827",
                      "secondary": "#34d399",
                      "surface-container-high": "#374151",
                      "pure-white": "#111827",
                      "surface-variant": "#1f2937",
                      "tertiary": "#94a3b8",
                      "tertiary-fixed-dim": "#64748b",
                      "primary-container": "#1e40af",
                      "deep-azure": "#60a5fa",
                      "outline-variant": "#374151",
                      "outline": "#9ca3af",
                      "surface-container-low": "#1f2937",
                      "primary": "#3b82f6",
                      "primary-fixed-dim": "#60a5fa",
                      "on-primary-fixed": "#eff6ff",
                      "on-secondary-fixed": "#ecfdf5",
                      "inverse-primary": "#1e3a8a",
                      "on-tertiary-container": "#f1f5f9",
                      "on-surface": "#f9fafb",
                      "surface": "#030712",
                      "on-secondary-fixed-variant": "#6ee7b7",
                      "surface-bright": "#1f2937"
              },
              "borderRadius": {
                      "DEFAULT": "0.25rem",
                      "lg": "0.5rem",
                      "xl": "0.75rem",
                      "full": "9999px"
              },
              "fontFamily": {
                      "display-lg": ["Hanken Grotesk"],
                      "headline-md": ["Hanken Grotesk"],
                      "label-caps": ["JetBrains Mono"],
                      "headline-lg": ["Hanken Grotesk"],
                      "headline-lg-mobile": ["Hanken Grotesk"],
                      "body-md": ["Hanken Grotesk"],
                      "body-lg": ["Hanken Grotesk"]
              },
          },
        }
    }
</script>
<link rel="stylesheet" href="styles.css">
</head>
<body class="bg-background text-on-background font-body-md antialiased h-screen overflow-hidden">
    <div class="relative min-h-screen w-full flex items-center justify-center px-4 py-12">
        <!-- Video Background -->
        <div class="absolute inset-0 w-full h-full overflow-hidden">
            <div class="absolute inset-0 bg-black/60 z-10"></div>
            <video class="absolute inset-0 min-w-full min-h-full object-cover w-auto h-auto" autoplay loop muted playsinline>
                <source src="https://videos.pexels.com/video-files/8128311/8128311-uhd_2560_1440_25fps.mp4" type="video/mp4" />
                Your browser does not support the video tag.
            </video>
        </div>

        <a href="index.html" class="absolute top-6 left-6 z-30 text-white/60 hover:text-white transition-colors flex items-center gap-2 font-label-caps uppercase tracking-wider">
            <span class="material-symbols-outlined text-[18px]">arrow_back</span>
            Back to Home
        </a>

        <!-- Login Form -->
        <div class="relative z-20 w-full max-w-md animate-[pulse_2s_ease-in-out_infinite]">
            <div class="p-8 rounded-2xl backdrop-blur-md bg-black/50 border border-white/10 shadow-2xl">
                <div class="mb-8 text-center">
                    <h2 class="text-3xl font-bold mb-2 relative group">
                        <span class="absolute -inset-1 bg-gradient-to-r from-primary/30 via-secondary/30 to-deep-azure/30 blur-xl opacity-75 group-hover:opacity-100 transition-all duration-500 animate-pulse"></span>
                        <span class="relative inline-block text-3xl font-bold mb-2 text-white tracking-tight">
                            CleanStream Portal
                        </span>
                        <span class="absolute -inset-0.5 bg-gradient-to-r from-primary/20 to-secondary/20 blur-sm opacity-0 group-hover:opacity-100 transition-all duration-300"></span>
                    </h2>
                    <div class="text-white/80 flex flex-col items-center space-y-1">
                        <span class="relative group cursor-default">
                            <span class="absolute -inset-1 bg-gradient-to-r from-primary/20 to-secondary/20 blur-sm opacity-0 group-hover:opacity-100 transition-opacity duration-500"></span>
                            <span class="relative inline-block text-sm">Your spotless space awaits</span>
                        </span>
                        <span class="text-[10px] text-white/50 tracking-widest uppercase font-label-caps mt-1">
                            [Access your account]
                        </span>
                        <div class="flex space-x-3 text-white/40 mt-3">
                            <span class="material-symbols-outlined text-[18px]">cleaning_services</span>
                            <span class="material-symbols-outlined text-[18px]">verified</span>
                            <span class="material-symbols-outlined text-[18px]">eco</span>
                        </div>
                    </div>
                </div>

                <form id="loginForm" class="space-y-6">
                    <!-- Email -->
                    <div class="relative">
                        <div class="absolute left-3 top-1/2 -translate-y-1/2 flex items-center text-white/60">
                            <span class="material-symbols-outlined text-[18px]">mail</span>
                        </div>
                        <input
                            type="email"
                            id="email"
                            placeholder="Email address"
                            required
                            class="w-full pl-10 pr-3 py-3 bg-white/5 border border-white/10 rounded-lg text-white placeholder-white/60 focus:outline-none focus:border-primary/50 transition-colors"
                        />
                    </div>

                    <!-- Password -->
                    <div class="relative">
                        <div class="absolute left-3 top-1/2 -translate-y-1/2 flex items-center text-white/60">
                            <span class="material-symbols-outlined text-[18px]">lock</span>
                        </div>
                        <input
                            type="password"
                            id="password"
                            placeholder="Password"
                            required
                            class="w-full pl-10 pr-10 py-3 bg-white/5 border border-white/10 rounded-lg text-white placeholder-white/60 focus:outline-none focus:border-primary/50 transition-colors"
                        />
                        <button
                            type="button"
                            id="togglePassword"
                            class="absolute right-3 top-1/2 -translate-y-1/2 text-white/60 hover:text-white focus:outline-none transition-colors flex items-center"
                            aria-label="Show password"
                        >
                            <span class="material-symbols-outlined text-[18px]" id="eyeIcon">visibility</span>
                        </button>
                    </div>

                    <!-- Remember & Forgot -->
                    <div class="flex items-center justify-between">
                        <div class="flex items-center space-x-2">
                            <div class="relative inline-block w-10 h-5 cursor-pointer" id="rememberToggleContainer">
                                <input type="checkbox" id="rememberMe" class="sr-only" />
                                <div id="toggleBg" class="absolute inset-0 rounded-full bg-white/20 transition-colors duration-200 ease-in-out">
                                    <div id="toggleDot" class="absolute left-0.5 top-0.5 w-4 h-4 rounded-full bg-white transition-transform duration-200 ease-in-out"></div>
                                </div>
                            </div>
                            <label for="rememberMe" class="text-sm text-white/80 cursor-pointer hover:text-white transition-colors">
                                Remember me
                            </label>
                        </div>
                        <a href="#" class="text-sm text-white/80 hover:text-white transition-colors">
                            Forgot password?
                        </a>
                    </div>

                    <!-- Submit -->
                    <button
                        type="submit"
                        id="submitBtn"
                        class="w-full py-3 rounded-lg bg-primary hover:bg-deep-azure text-white font-medium transition-all duration-200 ease-in-out transform hover:-translate-y-1 focus:outline-none focus:ring-2 focus:ring-primary focus:ring-opacity-50 disabled:opacity-70 disabled:cursor-not-allowed disabled:transform-none shadow-lg shadow-primary/20 hover:shadow-primary/40 flex justify-center items-center gap-2"
                    >
                        <span id="btnText">Enter Portal</span>
                        <span class="material-symbols-outlined text-[18px]" id="btnIcon">login</span>
                    </button>
                </form>

                <div class="mt-8">
                    <div class="relative flex items-center justify-center">
                        <div class="border-t border-white/10 absolute w-full"></div>
                        <div class="bg-black/50 backdrop-blur-md px-4 relative text-white/60 text-sm">
                            quick access via
                        </div>
                    </div>

                    <div class="mt-6 grid grid-cols-3 gap-3">
                        <button class="flex items-center justify-center p-2 bg-white/5 border border-white/10 rounded-lg text-white/80 hover:bg-white/10 hover:text-white transition-colors">
                            <span class="material-symbols-outlined text-[18px]">language</span>
                        </button>
                        <button class="flex items-center justify-center p-2 bg-white/5 border border-white/10 rounded-lg text-white/80 hover:bg-white/10 hover:text-white transition-colors">
                            <span class="material-symbols-outlined text-[18px]">tag</span>
                        </button>
                        <button class="flex items-center justify-center p-2 bg-white/5 border border-white/10 rounded-lg text-white/80 hover:bg-white/10 hover:text-white transition-colors">
                            <span class="material-symbols-outlined text-[18px]">mail</span>
                        </button>
                    </div>
                </div>

                <p class="mt-8 text-center text-sm text-white/60">
                    Don't have an account? 
                    <a href="#" class="font-medium text-white hover:text-primary transition-colors">
                        Create Account
                    </a>
                </p>
            </div>
        </div>

        <footer class="absolute bottom-4 left-0 right-0 text-center text-white/60 text-sm z-20">
            © 2026 CleanStream. All rights reserved.
        </footer>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // Password toggle
            const togglePassword = document.getElementById('togglePassword');
            const passwordInput = document.getElementById('password');
            const eyeIcon = document.getElementById('eyeIcon');

            togglePassword.addEventListener('click', () => {
                if (passwordInput.type === 'password') {
                    passwordInput.type = 'text';
                    eyeIcon.textContent = 'visibility_off';
                } else {
                    passwordInput.type = 'password';
                    eyeIcon.textContent = 'visibility';
                }
            });

            // Remember me toggle
            const rememberToggleContainer = document.getElementById('rememberToggleContainer');
            const rememberMe = document.getElementById('rememberMe');
            const toggleBg = document.getElementById('toggleBg');
            const toggleDot = document.getElementById('toggleDot');

            function updateToggle() {
                if (rememberMe.checked) {
                    toggleBg.classList.replace('bg-white/20', 'bg-primary');
                    toggleDot.classList.add('transform', 'translate-x-5');
                } else {
                    toggleBg.classList.replace('bg-primary', 'bg-white/20');
                    toggleDot.classList.remove('transform', 'translate-x-5');
                }
            }

            rememberToggleContainer.addEventListener('click', (e) => {
                if (e.target !== rememberMe) {
                    rememberMe.checked = !rememberMe.checked;
                }
                updateToggle();
            });
            rememberMe.addEventListener('change', updateToggle);

            // Form submission
            const loginForm = document.getElementById('loginForm');
            const submitBtn = document.getElementById('submitBtn');
            const btnText = document.getElementById('btnText');
            const btnIcon = document.getElementById('btnIcon');

            loginForm.addEventListener('submit', async (e) => {
                e.preventDefault();
                
                // Loading state
                submitBtn.disabled = true;
                btnText.textContent = 'Logging in...';
                btnIcon.textContent = 'hourglass_empty';
                
                // Simulate network request
                await new Promise(resolve => setTimeout(resolve, 1500));
                
                // Success state
                btnText.textContent = 'Success!';
                btnIcon.textContent = 'check_circle';
                submitBtn.classList.replace('bg-primary', 'bg-secondary-fixed');
                submitBtn.classList.replace('hover:bg-deep-azure', 'hover:bg-secondary-fixed');
                
                // Reset after delay (simulate redirect)
                setTimeout(() => {
                    submitBtn.disabled = false;
                    btnText.textContent = 'Enter Portal';
                    btnIcon.textContent = 'login';
                    submitBtn.classList.replace('bg-secondary-fixed', 'bg-primary');
                    submitBtn.classList.replace('hover:bg-secondary-fixed', 'hover:bg-deep-azure');
                    loginForm.reset();
                    updateToggle();
                }, 1000);
            });
        });
    </script>
</body>
</html>
